[package]
name = "shipper"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Core library for reliable, resumable Rust workspace publishing"
readme = "README.md"
documentation = "https://docs.rs/shipper"
homepage = "https://github.com/EffortlessMetrics/shipper"
repository = "https://github.com/EffortlessMetrics/shipper"
keywords = ["cargo", "publish", "workspace", "release", "automation"]
categories = ["development-tools", "development-tools::build-utils"]

[dependencies]
# Workspace microcrates
shipper-retry = { path = "../shipper-retry" }
shipper-lock = { path = "../shipper-lock", optional = true }
shipper-encrypt = { path = "../shipper-encrypt" }
shipper-auth = { path = "../shipper-auth", optional = true }
shipper-git = { path = "../shipper-git", optional = true }
shipper-events = { path = "../shipper-events", optional = true }
shipper-execution-core = { path = "../shipper-execution-core" }
shipper-environment = { path = "../shipper-environment", optional = true }
shipper-storage = { path = "../shipper-storage", optional = true }
shipper-cargo = { path = "../shipper-cargo", optional = true }
shipper-engine-parallel = { path = "../shipper-engine-parallel", optional = true }
shipper-plan = { path = "../shipper-plan", optional = true }
shipper-registry = { path = "../shipper-registry", optional = true }
shipper-process = { path = "../shipper-process", optional = true }
shipper-webhook = { path = "../shipper-webhook" }
shipper-types = { path = "../shipper-types" }
shipper-config = { path = "../shipper-config" }
shipper-state = { path = "../shipper-state", optional = true }
shipper-config-runtime = { path = "../shipper-config-runtime" }
shipper-store = { path = "../shipper-store", optional = true }
shipper-duration = { path = "../shipper-duration" }
shipper-schema = { path = "../shipper-schema" }
shipper-policy = { path = "../shipper-policy", optional = true }
shipper-cargo-failure = { path = "../shipper-cargo-failure" }
shipper-levels = { path = "../shipper-levels" }
shipper-sparse-index = { path = "../shipper-sparse-index" }
shipper-output-sanitizer = { path = "../shipper-output-sanitizer" }

anyhow = "1.0.102"
thiserror = "2.0.18"
cargo_metadata = "0.23.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_with = "3.17.0"
reqwest = { version = "0.13.2", features = ["blocking", "json", "rustls"] }
rand = { version = "0.10.0", features = ["std"] }
chrono = { version = "0.4.44", features = ["serde"] }
humantime = "2.3.0"
toml = "1.0.6"
hex = "0.4.3"
gethostname = "1.1.0"
tokio = { version = "1.42", features = ["rt", "time", "sync", "macros"] }
base64 = "0.22"
aes-gcm = "0.10"
pbkdf2 = { version = "0.12", features = ["simple"] }

# HMAC for webhook signatures
hmac = "0.12"
sha2 = "0.10"

[features]
micro-auth = ["dep:shipper-auth"]
micro-git = ["dep:shipper-git"]
micro-events = ["dep:shipper-events", "micro-types"]
micro-lock = ["dep:shipper-lock"]
micro-encrypt = []
micro-environment = ["dep:shipper-environment", "micro-types"]
micro-storage = ["dep:shipper-storage"]
micro-cargo = ["dep:shipper-cargo"]
micro-plan = ["dep:shipper-plan", "micro-types"]
micro-registry = ["dep:shipper-registry"]
micro-process = ["dep:shipper-process"]
micro-policy = ["dep:shipper-policy"]
micro-webhook = []
micro-types = ["micro-webhook", "micro-encrypt", "micro-config"]
micro-config = ["micro-types", "micro-storage"]
micro-state = ["dep:shipper-state", "micro-types", "micro-environment", "micro-encrypt"]
micro-store = ["dep:shipper-store", "micro-types", "micro-events", "micro-state"]
micro-parallel = ["micro-types", "micro-plan", "micro-registry", "dep:shipper-engine-parallel"]
micro-all = ["micro-auth", "micro-git", "micro-events", "micro-lock", "micro-encrypt", "micro-environment", "micro-storage", "micro-cargo", "micro-plan", "micro-registry", "micro-process", "micro-webhook", "micro-policy", "micro-types", "micro-config", "micro-state", "micro-store", "micro-parallel"]

[lints]
workspace = true

[dev-dependencies]
tempfile = "3.26.0"
insta = "1.46.3"
proptest = "1.10.0"
serial_test = "3.4.0"
tiny_http = "0.12.0"
temp-env = "0.3"

