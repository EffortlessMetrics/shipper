# ripr — advisory PR-time exposure lane (#182).
#
# Public README badges are repo-scoped. This workflow produces diff-scoped PR
# evidence only: summaries, warning annotations, and uploaded artifacts.

name: ripr (advisory)

on:
  pull_request:
    paths:
      - "crates/**"
      - "xtask/**"
      - "scripts/ripr-annotations.py"
      - "Cargo.toml"
      - "Cargo.lock"
      - "ripr.toml"
      - "policy/ripr-suppressions.toml"
      - ".github/workflows/ripr.yml"
  workflow_dispatch: {}

concurrency:
  group: ripr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  ripr-pr:
    name: ripr PR evidence (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ripr-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ripr-

      - name: Install ripr (pinned)
        run: cargo install ripr --locked --version 0.5.0

      - name: Fetch base branch
        if: github.base_ref != ''
        run: git fetch origin ${{ github.base_ref }}

      - name: RIPR PR evidence
        id: ripr_pr
        run: cargo xtask ripr-pr --base "origin/${{ github.base_ref || 'main' }}"

      - name: RIPR review guidance
        id: ripr_review
        run: cargo xtask ripr-review-comments --base "origin/${{ github.base_ref || 'main' }}" --head HEAD

      - name: RIPR PR contract
        if: always()
        run: cargo xtask ripr-pr --check

      - name: RIPR review summary
        if: always()
        shell: bash
        run: |
          {
            echo "## RIPR Review Guidance"
            echo
            if [ -f target/ripr/review/comments.md ]; then
              cat target/ripr/review/comments.md
            else
              echo "No RIPR review guidance was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: RIPR annotations
        if: always()
        run: python3 scripts/ripr-annotations.py

      - name: Upload RIPR PR evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-pr
          path: target/ripr/pr
          if-no-files-found: warn
          retention-days: 30

      - name: Upload RIPR review guidance
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-review
          path: target/ripr/review
          if-no-files-found: warn
          retention-days: 30
