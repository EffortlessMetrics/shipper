name: Badge Endpoints

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: badge-endpoints-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-badge-endpoints-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-badge-endpoints-

      - name: Install ripr
        run: cargo install ripr --locked --version 0.5.0

      - name: Refresh badge endpoints
        run: cargo xtask badges

      - name: Open badge refresh PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/badge-endpoints
          title: "badge: refresh public endpoints"
          commit-message: "badge: refresh public endpoints"
          body: |
            Refreshes generated Shields endpoint JSON under `badges/`.

            Generated by:

            ```bash
            cargo xtask badges
            ```
